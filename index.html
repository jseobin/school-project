<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>school-project</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe5;
      --card: rgba(255, 255, 255, 0.84);
      --ink: #132b2a;
      --muted: #4c6765;
      --accent: #d96b43;
      --line: rgba(19, 43, 42, 0.12);
      --glow: rgba(217, 107, 67, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 232, 190, 0.8), transparent 30rem),
        radial-gradient(circle at bottom right, rgba(117, 170, 154, 0.35), transparent 28rem),
        linear-gradient(160deg, #f7f1e7 0%, #efe6d3 45%, #e9ddc6 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow:
        0 20px 60px rgba(19, 43, 42, 0.12),
        0 0 0 10px var(--glow);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(217, 107, 67, 0.12);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0 0 18px;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 28px;
    }

    .meta-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.55);
    }

    .meta-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: var(--ink);
    }

    .meta-card span {
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <span class="eyebrow">Cloudflare Pages Ready</span>
    <h1>school-project</h1>
    <p>이 저장소는 GitHub와 Cloudflare Pages 연동을 위한 기본 배포 상태로 준비되었습니다.</p>
    <p>이후 코드를 추가하고 `main` 브랜치에 푸시하면 Cloudflare Pages가 자동으로 다시 빌드하고 배포합니다.</p>

    <section class="meta" aria-label="deployment notes">
      <div class="meta-card">
        <strong>Production branch</strong>
        <span>`main`</span>
      </div>
      <div class="meta-card">
        <strong>Build command</strong>
        <span>없음 또는 `exit 0`</span>
      </div>
      <div class="meta-card">
        <strong>Output directory</strong>
        <span>저장소 루트</span>
      </div>
    </section>
  </main>
</body>
</html>
